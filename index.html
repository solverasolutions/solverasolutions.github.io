<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Solvera Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx" id="app-script"></script>
    <script>
      (function () {
        var s = document.getElementById("app-script");
        s.addEventListener("error", function () {
          var root = document.getElementById("root");
          root.innerHTML =
            '<div style="padding:40px 24px;font-family:system-ui,sans-serif;max-width:560px;margin:0 auto;line-height:1.6">' +
            '<h1 style="color:#c00;font-size:1.5rem;margin-bottom:16px">Cannot load app (MIME / script error)</h1>' +
            '<p style="color:#333;margin-bottom:16px">You opened <code>index.html</code> directly or are serving the project root as static files. The browser then requests <code>.jsx</code> files, which get the wrong MIME type.</p>' +
            '<p style="font-weight:600;margin-bottom:8px">Fix:</p>' +
            '<ul style="margin:0 0 16px 1.2em;color:#333">' +
            "<li><strong>Local:</strong> Run <code>npm run dev</code> and open the URL Vite prints (e.g. http://localhost:5173).</li>" +
            "<li><strong>Production:</strong> Deploy the built <strong>dist/</strong> folder only (e.g. GitHub Actions: build then deploy <code>dist</code>). Do not serve the repo root.</li>" +
            "</ul>" +
            '<p style="color:#666;font-size:0.9rem">GitHub: Settings → Pages → Source = <strong>GitHub Actions</strong>.</p>' +
            "</div>";
        });
      })();
    </script>
  </body>
</html>
